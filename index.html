<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Janu ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff6a88, #ff99ac);
  overflow: hidden;
  color: white;
}

/* Glass card */
.card {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 320px;
  padding: 20px;
  border-radius: 25px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.15);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
}

img, video {
  width: 100%;
  height: 380px;
  object-fit: cover;
  border-radius: 20px;
  transition: all 0.6s ease;
}

.message {
  margin-top: 12px;
  font-size: 18px;
  min-height: 50px;
}

.progress {
  height: 4px;
  background: rgba(255,255,255,0.3);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 10px;
}

.bar {
  height: 100%;
  width: 0%;
  background: white;
}

/* Floating hearts */
.heart {
  position: fixed;
  bottom: -10px;
  color: pink;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity:1;}
  100% { transform: translateY(-100vh); opacity:0;}
}

/* Final screen */
#final {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 26px;
  text-align: center;
}
</style>

</head>

<body>

<div class="card" onclick="nextSlide()">
  <div class="progress"><div class="bar" id="bar"></div></div>

  <div id="media-container">
    <img id="media" src="photo1.jpg">
  </div>

  <div class="message" id="message"></div>
</div>

<div id="final">
  💖 Happy Birthday My Janu 💖 <br><br>
  You are my everything 😘 <br>
  I love you forever ❤️
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<canvas id="confetti"></canvas>

<script>
const slides = [
  {type:"image", src:"photo1.jpg", text:"Hey Janu... 💖"},
  {type:"image", src:"photo2.jpg", text:"From the moment I met you... 😍"},
  {type:"video", src:"video1.mp4", text:"Life became more beautiful ❤️"},
  {type:"image", src:"photo3.jpg", text:"You are my happiness 🌸"},
  {type:"image", src:"photo2.jpg", text:"Happy Birthday My Love 🎉"}
];

let index = 0;
let started = false;

/* Typing effect */
function typeText(text) {
  let i = 0;
  const el = document.getElementById("message");
  el.innerHTML = "";
  let speed = 35;

  let interval = setInterval(() => {
    el.innerHTML += text.charAt(i);
    i++;
    if (i >= text.length) clearInterval(interval);
  }, speed);
}

/* Slide change */
function nextSlide() {
  if (!started) {
    document.getElementById("music").play();
    started = true;
  }

  index++;

  if (index >= slides.length) {
    document.querySelector(".card").style.display = "none";
    document.getElementById("final").style.display = "block";
    startConfetti();
    return;
  }

  const container = document.getElementById("media-container");
  let slide = slides[index];

  if (slide.type === "image") {
    container.innerHTML = `<img src="${slide.src}">`;
  } else {
    container.innerHTML = `<video src="${slide.src}" autoplay loop></video>`;
  }

  typeText(slide.text);
  startProgress();
}

/* Progress bar auto next */
function startProgress() {
  const bar = document.getElementById("bar");
  bar.style.width = "0%";

  let width = 0;
  let interval = setInterval(() => {
    width += 1;
    bar.style.width = width + "%";

    if (width >= 100) {
      clearInterval(interval);
      nextSlide();
    }
  }, 50);
}

/* Floating hearts */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random()*100 + "vw";
  heart.style.fontSize = (Math.random()*20 + 10) + "px";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 500);

/* Confetti */
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];

function startConfetti() {
  for(let i=0;i<200;i++){
    pieces.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      size: Math.random()*6+2,
      speed: Math.random()*3+2
    });
  }
  animate();
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pieces.forEach(p=>{
    ctx.fillStyle = "white";
    ctx.fillRect(p.x,p.y,p.size,p.size);
    p.y += p.speed;
    if(p.y > canvas.height) p.y = 0;
  });
  requestAnimationFrame(animate);
}

/* Start */
typeText(slides[0].text);
startProgress();
</script>

</body>
</html>
